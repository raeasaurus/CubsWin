name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck -f gcc -x \
            scripts/*.sh \
            tests/*.sh \
            .claude/hooks/*.sh

  tests:
    name: security tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Validate JSON configs
        run: |
          jq . config/team-catalog.json > /dev/null
          jq . config/teams.json > /dev/null
      - name: Validate catalog completeness
        run: |
          counts=$(jq -c '[.mlb,.nfl,.nba,.nhl] | map(length)' config/team-catalog.json)
          echo "Catalog counts: $counts"
          jq -e '
            (.mlb | length) >= 30 and
            (.nfl | length) >= 32 and
            (.nba | length) >= 30 and
            (.nhl | length) >= 30
          ' config/team-catalog.json > /dev/null
      - name: Run security probe suite
        run: bash tests/security.sh
